name: Deploy to Tabbify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # github.token doubles as the repo-scoped clone token
    steps:
      - uses: actions/checkout@v4
      - uses: tabbify-io/deploy@v1
        with:
          token: ${{ secrets.TABBIFY_TOKEN }}
          # remote: true (default) — Tabbify clones & builds your repo on its own infra
          # clone-token defaults to github.token — no GitHub App, no extra setup
