<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabbify Quickstart</title>
    <style>
      body { font-family: system-ui, sans-serif; display: grid; place-items: center;
             min-height: 100vh; margin: 0; background: #0b0d10; color: #e8eaed; }
      .card { text-align: center; }
      h1 { font-size: 2.4rem; margin: 0 0 .4rem; }
      p { opacity: .7; }
      code { background: #1b1f24; padding: .15rem .4rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello from Tabbify 👋</h1>
      <p>Deployed straight from <code>git push</code>. Edit me and push again.</p>
    </div>
  </body>
</html>
