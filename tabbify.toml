# The whole app config. Tabbify builds the image and picks where to run it —
# omit [build].builder and [[deploy]] and the node selects a build host and a
# Firecracker run host for you. See https://tabbify.io/docs/quickstart
[app]
name = "quickstart"

[build]
kind = "docker"        # build the Dockerfile into an image

[runtime]
type             = "firecracker"   # run each app in its own microVM
lifecycle        = "on_request"    # start on the first request, idle out when unused
idle_timeout_sec = 300
memory_mb        = 256
vcpus            = 1

[routes]
dynamic_prefixes = ["/"]           # forward every path to the app
